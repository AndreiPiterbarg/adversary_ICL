model:
    family: gpt2
    n_dims: 20
    n_positions: 101
    n_embd: 256
    n_layer: 12
    n_head: 8

training:
    task: relu_2nn_regression
    task_kwargs:
        hidden_layer_size: 100
    data: gaussian
    batch_size: 64
    learning_rate: 0.0001
    save_every_steps: 1000
    keep_every_steps: 100000
    train_steps: 500001
    curriculum:
        dims:
            start: 5
            end: 20
            inc: 1
            interval: 2000
        points:
            start: 26
            end: 101
            inc: 5
            interval: 2000

out_dir: results/checkpoints/relu_2nn_regression

wandb:
    project: in-context-training
    entity: your-entity
    name: relu_2nn_regression_standard
    notes: ""
    log_every_steps: 100

test_run: false
