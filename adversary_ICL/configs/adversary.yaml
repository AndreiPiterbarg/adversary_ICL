# Adversarial search configuration
# Usage: python -m src.adversary.run --config configs/adversary.yaml

icl_model:
  run_path: "results/checkpoints/linear_regression/REPLACE_WITH_RUN_ID"
  step: -1  # -1 = latest checkpoint

task:
  name: "noisy_linear_regression"
  n_dims: 20
  n_points: 41

# Genome type: "pipeline" (compositional transform pipeline, 2104 dims)
# or "legacy" (original Cholesky-only genome, 231 dims)
genome:
  type: "pipeline"
  n_stages: 8

# Parsimony pressure: penalizes pipeline complexity to find minimal breaks.
# Set lambda=0 to disable. Tune with experiments/scripts/tune_lambda.py.
parsimony:
  lambda: 0.1
  c_base: 1.0       # cost of non-Gaussian base distribution
  c_stage: 1.0      # cost per active (non-identity) transform stage
  c_affine: 1.0     # cost of affine deviation from identity (per unit Frobenius norm / d)

search:
  budget: 200000     # total genome evaluations (larger for 2104-dim pipeline)
  pop_size: 64       # CMA-ES population per generation
  sigma_init: 0.3    # initial CMA-ES step size
  num_restarts: 10   # independent CMA-ES runs with different seeds
  seed: 0
  save_interval: 50  # save checkpoint every N generations

eval:
  batch_size: 64
  num_batches: 10    # batches per genome (10 * 64 = 640 eval examples)
  baselines:
    - "ridge"
    - "least_squares"
    - "averaging"

# Diagnostics: run on top-k failures after search completes.
# Expensive diagnostics (retrained_model) excluded by default.
diagnostics:
  enabled: true
  top_k: 5
  run:
    - "learning_curve"
    - "algorithm_id"
    - "weight_recovery"
    - "attention"
    - "linear_probing"
    - "gradient_attribution"
    - "pipeline_ablation"

output:
  save_dir: "results/adversary_runs"
